name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./botchat-app
        run: npm ci

      - name: Build Next.js App
        working-directory: ./botchat-app
        run: npm run build

      - name: Create Restart File
        run: |
          mkdir -p ./botchat-app/tmp
          touch ./botchat-app/tmp/restart.txt

      - name: Sync Files to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./botchat-app/
          server-dir: /botchat_app/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env*