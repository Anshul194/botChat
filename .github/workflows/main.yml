name: Deploy to FTP

on:
  push:
    branches:
      - main   # change if your branch is different

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./botchat-app   # ✅ your actual project folder

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node (important)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build + Export (for static hosting)
      - name: Build and Export
        run: |
          npx next build
          npx next export

      # 5. Deploy to FTP
      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./botchat-app/out/   # ✅ export folder
          server-dir: /public_html/megadm.chat/  # ✅ your live domain
          dangerous-clean-slate: true